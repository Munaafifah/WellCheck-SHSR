<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Radiologist Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --indigo-900: #1a1a4e;
            --indigo-700: #2d2d8a;
            --indigo-500: #4a4ac4;
            --indigo-300: #7a7ae0;
            --indigo-100: #c2c2f4;
            --indigo-50:  #eeeeff;
            --sand: #f5f0e8;
            --sand-dark: #e8dfd0;
            --text-dark: #1a1a35;
            --text-mid:  #4a4a70;
            --text-light: #9a9ab8;
            --white: #ffffff;
            --danger: #e05c5c;
            --success: #3aaa7a;
            --shadow-sm: 0 2px 8px rgba(26,26,78,0.08);
            --shadow-md: 0 6px 24px rgba(26,26,78,0.12);
            --radius: 12px;
            --radius-lg: 20px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--sand); color: var(--text-dark); min-height: 100vh; }
        .layout { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }

        /* SIDEBAR */
        .sidebar { background: var(--indigo-900); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
        .sidebar-brand { padding: 28px 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar-brand .brand-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--indigo-300); font-weight: 500; margin-bottom: 6px; }
        .sidebar-brand h1 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--white); line-height: 1.2; }
        .sidebar-brand h1 span { color: var(--indigo-300); }
        .profile-card { margin: 20px 16px; background: rgba(255,255,255,0.06); border-radius: var(--radius); padding: 16px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.08); }
        .profile-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid var(--indigo-300); flex-shrink: 0; }
        .profile-info .name { font-size: 14px; font-weight: 600; color: var(--white); }
        .profile-info .role-badge { font-size: 10px; background: var(--indigo-500); color: var(--white); padding: 2px 8px; border-radius: 20px; margin-top: 4px; display: inline-block; }
        .sidebar-nav { padding: 8px 12px; flex: 1; }
        .nav-section-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--indigo-300); padding: 12px 12px 6px; font-weight: 500; }
        .nav-link-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 10px; color: rgba(255,255,255,0.65); text-decoration: none; font-size: 14px; transition: all 0.2s ease; margin-bottom: 2px; }
        .nav-link-item:hover, .nav-link-item.active { background: var(--indigo-700); color: var(--white); }
        .nav-link-item i { width: 18px; text-align: center; font-size: 15px; }
        .sidebar-footer { padding: 16px; border-top: 1px solid rgba(255,255,255,0.08); }
        .logout-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 14px; background: rgba(224,92,92,0.15); border: 1px solid rgba(224,92,92,0.25); border-radius: 10px; color: #f4a0a0; font-size: 14px; cursor: pointer; text-decoration: none; transition: all 0.2s; }
        .logout-btn:hover { background: rgba(224,92,92,0.28); color: #ffcccc; }

        /* MAIN */
        .main { padding: 32px 36px; overflow-y: auto; }
        .page-header { margin-bottom: 28px; }
        .page-header .subtitle { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--indigo-500); font-weight: 500; margin-bottom: 4px; }
        .page-header h2 { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--indigo-900); font-weight: 600; }

        /* STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
        .stat-card { background: var(--white); border-radius: var(--radius-lg); padding: 22px 24px; box-shadow: var(--shadow-sm); border: 1px solid rgba(0,0,0,0.04); display: flex; align-items: center; gap: 16px; }
        .stat-icon { width: 50px; height: 50px; border-radius: 14px; background: var(--indigo-50); display: flex; align-items: center; justify-content: center; color: var(--indigo-500); font-size: 22px; flex-shrink: 0; }
        .stat-value { font-size: 26px; font-weight: 700; color: var(--indigo-900); line-height: 1; }
        .stat-label { font-size: 12px; color: var(--text-light); margin-top: 4px; }

        /* INFO CARD */
        .info-card { background: var(--white); border-radius: var(--radius-lg); padding: 28px; box-shadow: var(--shadow-sm); border: 1px solid rgba(0,0,0,0.04); }
        .info-card h5 { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--indigo-900); margin-bottom: 18px; }
        .info-row { display: flex; gap: 8px; margin-bottom: 12px; font-size: 14px; }
        .info-label { color: var(--text-light); width: 140px; flex-shrink: 0; }
        .info-value { color: var(--text-dark); font-weight: 500; }

        @media (max-width: 992px) { .layout { grid-template-columns: 1fr; } .sidebar { display: none; } .stats-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>

<body>
<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-label">WellCheck System</div>
            <h1>Radiology <span>Portal</span></h1>
        </div>

        <div class="profile-card">
            <img class="profile-avatar"
                 th:src="${radiologist.profilePicture} != null
                          ? 'data:' + ${radiologist.profilePictureType} + ';base64,' + ${radiologist.profilePicture}
                          : '/image/img_avatar1.png'"
                 alt="Profile Picture" />
            <div class="profile-info">
                <div class="name" th:text="${radiologist.name}">Radiologist</div>
                <span class="role-badge" th:text="${radiologist.specialization != null} ? ${radiologist.specialization} : 'Radiologist'">Radiologist</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-label">Main Menu</div>
            <a th:href="@{/radiologist}" class="nav-link-item active">
                <i class="fa-solid fa-house-medical"></i>
                Dashboard
            </a>
            <div class="nav-section-label" style="margin-top: 8px;">Account</div>
            <a th:href="@{/radiologist/updateProfile}" class="nav-link-item">
                <i class="fa-solid fa-user-pen"></i>
                Edit Profile
            </a>
        </nav>

        <div class="sidebar-footer">
            <form th:action="@{/logout}" method="post" hidden name="logoutForm">
                <input type="submit" value="Logout" />
            </form>
            <a href="javascript: document.logoutForm.submit()" class="logout-btn">
                <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </a>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <div class="page-header">
            <div class="subtitle">Welcome back</div>
            <h2 th:text="'Hello, Dr. ' + ${radiologist.name}">Hello, Radiologist</h2>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-microscope"></i></div>
                <div>
                    <div class="stat-value">—</div>
                    <div class="stat-label">Reports Today</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-clock-rotate-left"></i></div>
                <div>
                    <div class="stat-value">—</div>
                    <div class="stat-label">Pending Reviews</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-hospital"></i></div>
                <div>
                    <div class="stat-value" th:text="${radiologist.department != null} ? ${radiologist.department} : '—'">—</div>
                    <div class="stat-label">Department</div>
                </div>
            </div>
        </div>

        <div class="info-card">
            <h5>Profile Information</h5>
            <div class="info-row">
                <span class="info-label">User ID</span>
                <span class="info-value" th:text="${radiologist.userId}">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Full Name</span>
                <span class="info-value" th:text="${radiologist.name}">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Email</span>
                <span class="info-value" th:text="${radiologist.email}">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Contact</span>
                <span class="info-value" th:text="${radiologist.contact}">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Department</span>
                <span class="info-value" th:text="${radiologist.department}">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Specialization</span>
                <span class="info-value" th:text="${radiologist.specialization}">—</span>
            </div>
        </div>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
