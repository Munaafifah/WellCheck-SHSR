<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Health Status History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/viewHealthStatus.css}">
</head>

<body>
    <div class="layout">

        <!-- ════════════ SIDEBAR ════════════ -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-label">WellCheck System</div>
                <h1>Patient <span>Portal</span></h1>
            </div>

            <div class="profile-card">
                <img class="profile-avatar" th:src="${patient != null and patient.profilePicture != null}
                         ? 'data:' + ${patient.profilePictureType} + ';base64,' + ${patient.profilePicture}
                         : '/image/img_avatar1.png'" alt="Profile Picture" />
                <div class="profile-info">
                    <div class="name" th:text="${patient != null} ? ${patient.name} : 'Patient'">Patient</div>
                    <span class="role-badge">Patient</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section-label">Main Menu</div>
                <a th:href="@{/patient}" class="nav-link-item">
                    <i class="fa-solid fa-house-medical"></i>
                    Dashboard
                </a>
                <a th:href="@{/viewPatientHealthStatus/b(patientId=${patient?.userId}, doctorId=${doctor?.userId}, pageNo=1)}"
                    class="nav-link-item active">
                    <i class="fa-solid fa-notes-medical"></i>
                    View Health Status
                </a>
                <a th:href="@{/patient/sensorDashboard(patientId=${patient?.userId}, role='patient')}"
                    class="nav-link-item">
                    <i class="fa-solid fa-heart-pulse"></i>
                    Health Condition
                </a>
                <div class="nav-section-label" style="margin-top: 8px;">Account</div>
                <a th:href="@{/patient/editProfile(patientId=${patient?.userId})}" class="nav-link-item">
                    <i class="fa-solid fa-user-pen"></i>
                    Edit Profile
                </a>
            </nav>

            <div class="sidebar-footer">
                <form th:action="@{/logout}" method="post" hidden name="logoutForm">
                    <input type="submit" value="Logout" />
                </form>
                <a href="javascript: document.logoutForm.submit()" class="logout-btn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Logout
                </a>
            </div>
        </aside>

        <!-- ════════════ MAIN ════════════ -->
        <main class="main">

            <!-- Page Header -->
            <div class="page-header">
                <a th:href="@{/patient}" class="back-btn" title="Back to Dashboard">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <h2>Health Status History</h2>
            </div>

            <!-- Search -->
            <div class="appt-search-wrap">
                <div class="appt-search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="Search symptoms or date...">
                </div>
                <button class="appt-search-btn" onclick="doSearch()">
                    <i class="fa-solid fa-magnifying-glass"></i> Search
                </button>
                <button class="appt-reset-btn" onclick="resetSearch()">
                    <i class="fa-solid fa-rotate-left"></i> Reset
                </button>
            </div>

            <!-- Table Card -->
            <div class="table-card">
                <div class="table-card-header">
                    <i class="fa-solid fa-notes-medical"></i>
                    <span>Submitted Symptoms</span>
                    <span class="record-count"
                        th:text="${healthStatusList != null} ? ${healthStatusList.size()} + ' records' : '0 records'">
                    </span>
                </div>

                <table class="health-table">
                    <thead>
                        <tr>
                            <th style="width:5%;">#</th>
                            <th style="width:20%;">Date &amp; Time</th>
                            <th>Symptoms</th>
                        </tr>
                    </thead>
                    <tbody id="healthTableBody">
                        <tr th:if="${healthStatusList == null or healthStatusList.isEmpty()}">
                            <td colspan="3" class="empty-row">
                                <i class="fa-solid fa-clipboard-check"
                                    style="font-size:24px; color: var(--rose-300); margin-bottom:8px; display:block;"></i>
                                No health status records found.
                            </td>
                        </tr>
                        <tr th:each="entry, stat : ${healthStatusList}">
                            <td th:text="${stat.count}">1</td>
                            <td>
                                <span class="timestamp-text" th:text="${entry.value.timestamp}">Date</span>
                            </td>
                            <td>
                                <span th:each="symptom : ${entry.value.symptomsList}" class="symptom-badge"
                                    th:text="${symptom}">Symptom</span>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <!-- Pagination -->
                <div class="pagination-wrap" th:if="${totalPage != null and totalPage > 1}">
                    <a class="page-btn" th:classappend="${currentPage == 1} ? ' disabled'"
                        th:href="@{/viewPatientHealthStatus/b(patientId=${patient.userId}, doctorId=${doctor.userId}, pageNo=${prevPage})}">
                        &laquo; Prev
                    </a>
                    <a th:each="i : ${#numbers.sequence(1, totalPage)}" class="page-btn"
                        th:classappend="${i == currentPage} ? ' active'"
                        th:href="@{/viewPatientHealthStatus/b(patientId=${patient.userId}, doctorId=${doctor.userId}, pageNo=${i})}"
                        th:text="${i}">1</a>
                    <a class="page-btn" th:classappend="${currentPage == totalPage} ? ' disabled'"
                        th:href="@{/viewPatientHealthStatus/b(patientId=${patient.userId}, doctorId=${doctor.userId}, pageNo=${nextPage})}">
                        Next &raquo;
                    </a>
                </div>
            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function doSearch() {
            var query = document.getElementById('searchInput').value.toLowerCase();
            var rows = document.querySelectorAll('#healthTableBody tr');
            rows.forEach(function (row) {
                row.style.display = row.textContent.toLowerCase().includes(query) ? '' : 'none';
            });
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            var rows = document.querySelectorAll('#healthTableBody tr');
            rows.forEach(function (row) { row.style.display = ''; });
        }

        document.getElementById('searchInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') doSearch();
        });
    </script>
</body>

</html>
