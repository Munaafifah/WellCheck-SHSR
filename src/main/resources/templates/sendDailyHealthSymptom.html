<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Send Health Symptoms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css">
    <link rel="stylesheet" th:href="@{/css/sendDailyHealthSymptom.css}">
</head>

<body>
    <div class="layout">

        <!-- ════════════ SIDEBAR ════════════ -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-label">WellCheck System</div>
                <h1>Patient <span>Portal</span></h1>
            </div>

            <div class="profile-card">
                <img class="profile-avatar" th:src="${patient != null and patient.profilePicture != null}
                         ? 'data:' + ${patient.profilePictureType} + ';base64,' + ${patient.profilePicture}
                         : '/image/img_avatar1.png'" alt="Profile Picture" />
                <div class="profile-info">
                    <div class="name" th:text="${patient != null} ? ${patient.name} : 'Patient'">Patient</div>
                    <span class="role-badge">Patient</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section-label">Main Menu</div>
                <a th:href="@{/patient}" class="nav-link-item">
                    <i class="fa-solid fa-house-medical"></i>
                    Dashboard
                </a>
                <a th:href="@{/viewPatientHealthStatus/b(patientId=${patient?.userId}, doctorId=${doctor?.userId}, pageNo=1)}"
                    class="nav-link-item">
                    <i class="fa-solid fa-notes-medical"></i>
                    View Health Status
                </a>
                <a th:href="@{/patient/sensorDashboard(patientId=${patient?.userId}, role='patient')}"
                    class="nav-link-item">
                    <i class="fa-solid fa-heart-pulse"></i>
                    Health Condition
                </a>
                <div class="nav-section-label" style="margin-top: 8px;">Account</div>
                <a th:href="@{/patient/editProfile}" class="nav-link-item">
                    <i class="fa-solid fa-user-pen"></i>
                    Edit Profile
                </a>
            </nav>

            <div class="sidebar-footer">
                <form th:action="@{/logout}" method="post" hidden name="logoutForm">
                    <input type="submit" value="Logout" />
                </form>
                <a href="javascript: document.logoutForm.submit()" class="logout-btn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Logout
                </a>
            </div>
        </aside>

        <!-- ════════════ MAIN ════════════ -->
        <main class="main">

            <!-- Page Header -->
            <div class="page-header">
                <form th:action="@{/patient/backDashboard}" method="post" style="display:inline;">
                    <input type="hidden" th:name="patientId" th:value="${patient?.userId}" />
                    <input type="hidden" th:name="doctorId" th:value="${doctor?.userId}" />
                    <button type="submit" class="back-btn" title="Back to Dashboard">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                </form>
                <h2>Send Health Symptoms</h2>
            </div>

            <!-- Doctor Info -->
            <div class="doctor-card" th:if="${doctor != null}">
                <div class="doctor-icon">
                    <i class="fa-solid fa-user-doctor"></i>
                </div>
                <div class="doctor-info">
                    <div class="label">Sending to</div>
                    <div class="doctor-name" th:text="${doctor.name}">Doctor</div>
                    <div class="doctor-pos" th:text="${doctor.position}">Specialization</div>
                </div>
            </div>

            <!-- Symptom Form -->
            <form action="/DiagnosisResult" method="post">
                <input type="hidden" th:value="${patient?.userId}" name="patientId">

                <div class="form-card">
                    <div class="form-card-header">
                        <i class="fa-solid fa-stethoscope"></i>
                        <span>Select Your Symptoms</span>
                    </div>

                    <div class="form-card-body" id="symptomContainer">
                        <div class="symptom-row" id="symptomRow1">
                            <span class="row-num">1</span>
                            <select class="form-select" name="symptom[]" required>
                                <option value="">Choose a symptom...</option>
                            </select>
                        </div>
                    </div>

                    <div style="padding: 0 28px 20px;">
                        <button type="button" class="btn-add" id="addSymptomBtn">
                            <i class="fa-solid fa-plus"></i> Add Another Symptom
                        </button>
                    </div>

                    <div class="form-card-footer">
                        <a th:href="@{/patient}" class="btn-outline-rose">
                            <i class="fa-solid fa-xmark"></i> Cancel
                        </a>
                        <button type="submit" class="btn-rose">
                            <i class="fa-solid fa-paper-plane"></i> Send Symptoms
                        </button>
                    </div>
                </div>
            </form>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>

    <script>
        const symptomList = [
            "itching", "skin_rash", "nodal_skin_eruptions", "continuous_sneezing", "shivering", "chills",
            "joint_pain", "stomach_pain", "acidity", "ulcers_on_tongue", "muscle_wasting", "vomiting",
            "burning_micturition", "fatigue", "weight_gain", "anxiety", "cold_hands_and_feets", "mood_swings",
            "weight_loss", "restlessness", "lethargy", "patches_in_throat", "irregular_sugar_level", "cough",
            "high_fever", "sunken_eyes", "breathlessness", "sweating", "dehydration", "indigestion", "headache",
            "yellowish_skin", "dark_urine", "nausea", "loss_of_appetite", "pain_behind_the_eyes", "back_pain",
            "constipation", "abdominal_pain", "diarrhoea", "mild_fever", "yellow_urine", "yellowing_of_eyes",
            "acute_liver_failure", "fluid_overload", "swelling_of_stomach", "swelled_lymph_nodes", "malaise",
            "blurred_and_distorted_vision", "phlegm", "throat_irritation", "redness_of_eyes", "sinus_pressure",
            "runny_nose", "congestion", "chest_pain", "weakness_in_limbs", "fast_heart_rate",
            "pain_during_bowel_movements", "pain_in_anal_region", "bloody_stool", "irritation_in_anus",
            "neck_pain", "dizziness", "cramps", "bruising", "obesity", "swollen_legs", "swollen_blood_vessels",
            "puffy_face_and_eyes", "enlarged_thyroid", "brittle_nails", "swollen_extremeties", "excessive_hunger",
            "drying_and_tingling_lips", "slurred_speech", "knee_pain", "hip_joint_pain", "muscle_weakness",
            "stiff_neck", "swelling_joints", "movement_stiffness", "spinning_movements", "loss_of_balance",
            "unsteadiness", "weakness_of_one_body_side", "loss_of_smell", "bladder_discomfort",
            "continuous_feel_of_urine", "passage_of_gases", "internal_itching", "depression", "irritability",
            "muscle_pain", "altered_sensorium", "red_spots_over_body", "belly_pain", "abnormal_menstruation",
            "watering_from_eyes", "increased_appetite", "polyuria", "family_history", "mucoid_sputum",
            "rusty_sputum", "lack_of_concentration", "visual_disturbances", "receiving_blood_transfusion",
            "receiving_unsterile_injections", "coma", "stomach_bleeding", "distention_of_abdomen",
            "history_of_alcohol_consumption", "blood_in_sputum", "prominent_veins_on_calf", "palpitations",
            "painful_walking", "pus_filled_pimples", "blackheads", "scurring", "skin_peeling",
            "silver_like_dusting", "small_dents_in_nails", "inflammatory_nails", "blister",
            "red_sore_around_nose", "yellow_crust_ooze", "prognosis"
        ];

        function formatSymptom(s) {
            return s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }

        function populateSelect(select) {
            symptomList.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.text = formatSymptom(s);
                select.appendChild(opt);
            });
        }

        // Populate first row
        const firstSelect = document.querySelector('#symptomRow1 select');
        populateSelect(firstSelect);
        $(firstSelect).select2({ placeholder: 'Choose a symptom...' });

        let rowCount = 1;
        const MAX_SYMPTOMS = 10;

        document.getElementById('addSymptomBtn').addEventListener('click', function () {
            if (rowCount >= MAX_SYMPTOMS) return;
            rowCount++;

            const row = document.createElement('div');
            row.className = 'symptom-row';
            row.id = 'symptomRow' + rowCount;

            const num = document.createElement('span');
            num.className = 'row-num';
            num.textContent = rowCount;

            const select = document.createElement('select');
            select.className = 'form-select';
            select.name = 'symptom[]';
            select.required = true;

            const placeholder = document.createElement('option');
            placeholder.value = '';
            placeholder.text = 'Choose a symptom...';
            select.appendChild(placeholder);
            populateSelect(select);

            const delBtn = document.createElement('button');
            delBtn.type = 'button';
            delBtn.className = 'btn-delete-row';
            delBtn.innerHTML = '<i class="fa-solid fa-trash"></i>';
            delBtn.addEventListener('click', function () {
                row.remove();
                rowCount--;
                document.getElementById('addSymptomBtn').disabled = false;
                document.querySelectorAll('#symptomContainer .symptom-row').forEach((r, i) => {
                    r.querySelector('.row-num').textContent = i + 1;
                });
            });

            row.appendChild(num);
            row.appendChild(select);
            row.appendChild(delBtn);
            document.getElementById('symptomContainer').appendChild(row);

            $(select).select2({ placeholder: 'Choose a symptom...' });

            if (rowCount >= MAX_SYMPTOMS) {
                this.disabled = true;
            }
        });
    </script>
</body>

</html>
