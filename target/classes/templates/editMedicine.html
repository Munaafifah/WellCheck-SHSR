<!DOCTYPE html>
<html lang="en"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Medicine - Pharmacist</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --orange-900: #4a1f00;
            --orange-700: #c2530a;
            --orange-500: #f07830;
            --orange-300: #f7a870;
            --orange-100: #fde0c8;
            --orange-50:  #fff5ee;
            --sand:       #fdf7f2;
            --sand-dark:  #f0e4d8;
            --text-dark:  #2e1a0e;
            --text-mid:   #6b4030;
            --text-light: #b08070;
            --white:      #ffffff;
            --danger:     #e05c5c;
            --shadow-sm:  0 2px 8px rgba(74,31,0,0.08);
            --shadow-md:  0 6px 24px rgba(74,31,0,0.12);
            --shadow-lg:  0 16px 48px rgba(74,31,0,0.16);
            --radius:     12px;
            --radius-lg:  20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--sand);
            color: var(--text-dark);
            min-height: 100vh;
        }

        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            background: var(--orange-900);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-brand {
            padding: 28px 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .sidebar-brand .brand-label {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--orange-300);
            font-weight: 500;
            margin-bottom: 6px;
        }

        .sidebar-brand h1 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: var(--white);
            line-height: 1.2;
        }

        .sidebar-brand h1 span { color: var(--orange-300); }

        .profile-card {
            margin: 20px 16px;
            background: rgba(255,255,255,0.06);
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .profile-avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--orange-300);
            flex-shrink: 0;
        }

        .profile-info .name {
            font-size: 14px;
            font-weight: 600;
            color: var(--white);
        }

        .profile-info .role-badge {
            font-size: 10px;
            background: var(--orange-500);
            color: var(--white);
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 4px;
            display: inline-block;
        }

        .sidebar-nav { padding: 8px 12px; flex: 1; }

        .nav-section-label {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--orange-300);
            padding: 12px 12px 6px;
            font-weight: 500;
        }

        .nav-link-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 14px;
            border-radius: 10px;
            color: rgba(255,255,255,0.65);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s ease;
            margin-bottom: 2px;
        }

        .nav-link-item:hover { background: rgba(255,255,255,0.1); color: var(--white); }

        .nav-link-item.active {
            background: var(--orange-700);
            color: var(--white);
            font-weight: 500;
        }

        .nav-link-item i { width: 18px; text-align: center; font-size: 15px; }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 11px 14px;
            background: rgba(224,92,92,0.15);
            border: 1px solid rgba(224,92,92,0.25);
            border-radius: 10px;
            color: #f4a0a0;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .logout-btn:hover { background: rgba(224,92,92,0.28); color: #ffcccc; }

        /* ── MAIN ── */
        .main { padding: 32px 36px; overflow-y: auto; }

        .page-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
        }

        .back-btn {
            width: 38px; height: 38px;
            border-radius: 10px;
            background: var(--white);
            border: 1px solid var(--sand-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-mid);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .back-btn:hover {
            background: var(--orange-50);
            border-color: var(--orange-300);
            color: var(--orange-700);
        }

        .page-header-text .subtitle {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--orange-500);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .page-header-text h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--orange-900);
            font-weight: 600;
        }

        /* ── FORM CARD ── */
        .form-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0,0,0,0.04);
            overflow: hidden;
            max-width: 640px;
        }

        .form-card-header {
            padding: 20px 28px;
            background: var(--sand);
            border-bottom: 1px solid var(--sand-dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-card-header i {
            color: var(--orange-500);
            font-size: 16px;
        }

        .form-card-header span {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            color: var(--orange-900);
            font-weight: 600;
        }

        .form-card-body { padding: 28px; }

        .form-group { margin-bottom: 20px; }

        .form-label-custom {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--text-mid);
            margin-bottom: 7px;
            display: block;
        }

        .form-control-custom {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--sand-dark);
            border-radius: 9px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-dark);
            background: var(--sand);
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .form-control-custom:focus {
            border-color: var(--orange-300);
            background: var(--white);
        }

        .form-control-custom[readonly] {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .input-group-custom {
            display: flex;
            align-items: center;
        }

        .input-prefix {
            font-size: 13px;
            color: var(--text-mid);
            background: var(--sand-dark);
            padding: 10px 12px;
            border: 1px solid var(--sand-dark);
            border-right: none;
            border-radius: 9px 0 0 9px;
            white-space: nowrap;
        }

        .form-control-custom.with-prefix {
            border-radius: 0 9px 9px 0;
        }

        .helper-text {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 5px;
        }

        .form-divider {
            border: none;
            border-top: 1px solid var(--sand-dark);
            margin: 24px 0;
        }

        .form-card-footer {
            padding: 20px 28px;
            background: var(--sand);
            border-top: 1px solid var(--sand-dark);
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-orange {
            padding: 10px 22px;
            background: var(--orange-500);
            color: var(--white);
            border: none;
            border-radius: 9px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            text-decoration: none;
        }

        .btn-orange:hover { background: var(--orange-700); color: var(--white); }

        .btn-outline-orange {
            padding: 10px 22px;
            background: transparent;
            color: var(--orange-700);
            border: 1px solid var(--orange-300);
            border-radius: 9px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            text-decoration: none;
        }

        .btn-outline-orange:hover { background: var(--orange-50); color: var(--orange-700); }

        /* Med ID badge */
        .med-id-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--orange-50);
            border: 1px solid var(--orange-100);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            color: var(--orange-700);
            font-family: monospace;
            margin-bottom: 20px;
        }

        @media (max-width: 992px) {
            .layout { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>

<body>
<div class="layout">

    <!-- ════════════ SIDEBAR ════════════ -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-label">WellCheck System</div>
            <h1>Pharma <span>Hub</span></h1>
        </div>

        <div class="profile-card">
            <img class="profile-avatar"
                 th:src="${pharmacist.profilePicture} != null
                         ? 'data:' + ${pharmacist.profilePictureType} + ';base64,' + ${pharmacist.profilePicture}
                         : '/image/img_avatar1.png'"
                 alt="Profile Picture" />
            <div class="profile-info">
                <div class="name" th:text="${pharmacist.name}">Pharmacist</div>
                <span class="role-badge"
                      th:text="${pharmacist.position != null} ? ${pharmacist.position} : 'Pharmacist'">Pharmacist</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-label">Main Menu</div>
            <a th:href="@{/pharmacist}" class="nav-link-item">
                <i class="fa-solid fa-pills"></i>
                Medicine Stock
            </a>
            <a th:href="@{/pharmacist/viewMedicineList}" class="nav-link-item active">
                <i class="fa-solid fa-list"></i>
                Medicine List
            </a>
            <a th:href="@{/pharmacist/patient-medicine-list}" class="nav-link-item">
                <i class="fa-solid fa-user-injured"></i>
                Patient Medicines
            </a>
            <div class="nav-section-label" style="margin-top: 8px;">Account</div>
            <a th:href="@{/pharmacist/updateProfile}" class="nav-link-item">
                <i class="fa-solid fa-user-pen"></i>
                Edit Profile
            </a>
        </nav>

        <div class="sidebar-footer">
            <form th:action="@{/logout}" method="post" hidden name="logoutForm">
                <input type="submit" value="Logout" />
            </form>
            <a href="javascript: document.logoutForm.submit()" class="logout-btn">
                <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </a>
        </div>
    </aside>

    <!-- ════════════ MAIN ════════════ -->
    <main class="main">

        <!-- Page Header -->
        <div class="page-header">
            <a th:href="@{/pharmacist/viewMedicineList}" class="back-btn" title="Back to Medicine List">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div class="page-header-text">
                <div class="subtitle">Inventory Management</div>
                <h2>Edit Medicine</h2>
            </div>
        </div>

        <!-- Form Card -->
        <div class="form-card">
            <div class="form-card-header">
                <i class="fa-solid fa-pen-to-square"></i>
                <span>Medicine Information</span>
            </div>

            <form th:action="@{'/pharmacist/updateMedicine/' + ${medicine.medId}}" method="post">

                <div class="form-card-body">

                    <!-- Medicine ID (read-only display) -->
                    <div class="med-id-badge">
                        <i class="fa-solid fa-fingerprint"></i>
                        Medicine ID: <strong th:text="${medicine.medId}">—</strong>
                    </div>
                    <input type="hidden" name="medId" th:value="${medicine.medId}">

                    <!-- Medicine Name -->
                    <div class="form-group">
                        <label class="form-label-custom">Medicine Name</label>
                        <input type="text" name="medName"
                               class="form-control-custom"
                               th:value="${medicine.medName}"
                               placeholder="e.g. Paracetamol"
                               required>
                    </div>

                    <!-- Quantity -->
                    <div class="form-group">
                        <label class="form-label-custom">Quantity</label>
                        <input type="number" name="quantity"
                               class="form-control-custom"
                               th:value="${medicine.quantity}"
                               min="0" required>
                        <div class="helper-text">Current stock units available</div>
                    </div>

                    <hr class="form-divider">

                    <!-- Price -->
                    <div class="form-group">
                        <label class="form-label-custom">Price (RM)</label>
                        <div class="input-group-custom">
                            <span class="input-prefix">RM</span>
                            <input type="number" name="price"
                                   class="form-control-custom with-prefix"
                                   th:value="${medicine.price}"
                                   step="0.01" min="0"
                                   placeholder="0.00" required>
                        </div>
                        <div class="helper-text">Price per unit dispensed to patient</div>
                    </div>

                </div>

                <div class="form-card-footer">
                    <a th:href="@{/pharmacist/viewMedicineList}" class="btn-outline-orange">
                        <i class="fa-solid fa-xmark"></i> Cancel
                    </a>
                    <button type="submit" class="btn-orange">
                        <i class="fa-solid fa-floppy-disk"></i> Save Changes
                    </button>
                </div>

            </form>
        </div>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
