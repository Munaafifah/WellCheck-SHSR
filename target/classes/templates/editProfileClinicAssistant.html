<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Profile - Clinic Assistant</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --teal-900: #0d3b35;
            --teal-700: #1a6b5f;
            --teal-500: #2a9d8a;
            --teal-300: #52c4b0;
            --teal-100: #b2e8e2;
            --teal-50: #e8f8f6;
            --sand: #f5f0e8;
            --sand-dark: #e8dfd0;
            --text-dark: #1a2e2b;
            --text-mid: #4a6360;
            --text-light: #8aaca8;
            --white: #ffffff;
            --danger: #e05c5c;
            --shadow-sm: 0 2px 8px rgba(13, 59, 53, 0.08);
            --shadow-md: 0 6px 24px rgba(13, 59, 53, 0.12);
            --shadow-lg: 0 16px 48px rgba(13, 59, 53, 0.16);
            --radius: 12px;
            --radius-lg: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--sand);
            color: var(--text-dark);
            min-height: 100vh;
        }

        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            background: var(--teal-900);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-brand {
            padding: 28px 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sidebar-brand .brand-label {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--teal-300);
            font-weight: 500;
            margin-bottom: 6px;
        }

        .sidebar-brand h1 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: var(--white);
            line-height: 1.2;
        }

        .sidebar-brand h1 span {
            color: var(--teal-300);
        }

        .profile-card {
            margin: 20px 16px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .profile-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--teal-300);
            flex-shrink: 0;
        }

        .profile-info .name {
            font-size: 14px;
            font-weight: 600;
            color: var(--white);
        }

        .profile-info .role-badge {
            font-size: 10px;
            background: var(--teal-500);
            color: var(--white);
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 4px;
            display: inline-block;
        }

        .sidebar-nav {
            padding: 8px 12px;
            flex: 1;
        }

        .nav-section-label {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--teal-300);
            padding: 12px 12px 6px;
            font-weight: 500;
        }

        .nav-link-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 14px;
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.65);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s ease;
            margin-bottom: 2px;
        }

        .nav-link-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
        }

        .nav-link-item.active {
            background: var(--teal-700);
            color: var(--white);
            font-weight: 500;
        }

        .nav-link-item i {
            width: 18px;
            text-align: center;
            font-size: 15px;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 11px 14px;
            background: rgba(224, 92, 92, 0.15);
            border: 1px solid rgba(224, 92, 92, 0.25);
            border-radius: 10px;
            color: #f4a0a0;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(224, 92, 92, 0.28);
            color: #ffcccc;
        }

        /* ── MAIN ── */
        .main {
            padding: 32px 36px;
            overflow-y: auto;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
        }

        .back-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: var(--white);
            border: 1px solid var(--sand-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-mid);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .back-btn:hover {
            background: var(--teal-50);
            border-color: var(--teal-300);
            color: var(--teal-700);
        }

        .page-header-text .subtitle {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--teal-500);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .page-header-text h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--teal-900);
            font-weight: 600;
        }

        /* ── PROFILE PICTURE CARD ── */
        .profile-pic-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0, 0, 0, 0.04);
            padding: 28px;
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 20px;
        }

        .current-avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--teal-300);
            flex-shrink: 0;
        }

        .avatar-info h6 {
            font-family: 'Playfair Display', serif;
            font-size: 17px;
            color: var(--teal-900);
            margin-bottom: 4px;
        }

        .avatar-info p {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 12px;
        }

        .file-input-label {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 16px;
            background: var(--teal-50);
            border: 1px dashed var(--teal-300);
            border-radius: 9px;
            font-size: 13px;
            color: var(--teal-700);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .file-input-label:hover {
            background: var(--teal-100);
            border-color: var(--teal-500);
        }

        .file-input-label input[type="file"] {
            display: none;
        }

        .file-name-display {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 8px;
        }

        /* ── FORM CARD ── */
        .form-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        .form-card-header {
            padding: 20px 28px;
            background: var(--sand);
            border-bottom: 1px solid var(--sand-dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-card-header i {
            color: var(--teal-500);
            font-size: 16px;
        }

        .form-card-header span {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            color: var(--teal-900);
            font-weight: 600;
        }

        .form-card-body {
            padding: 28px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-label-custom {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--text-mid);
            margin-bottom: 7px;
            display: block;
        }

        .form-control-custom {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--sand-dark);
            border-radius: 9px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-dark);
            background: var(--sand);
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .form-control-custom:focus {
            border-color: var(--teal-300);
            background: var(--white);
        }

        .helper-text {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 5px;
        }

        .form-card-footer {
            padding: 20px 28px;
            background: var(--sand);
            border-top: 1px solid var(--sand-dark);
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-teal {
            padding: 10px 22px;
            background: var(--teal-700);
            color: var(--white);
            border: none;
            border-radius: 9px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }

        .btn-teal:hover {
            background: var(--teal-900);
        }

        .btn-outline-teal {
            padding: 10px 22px;
            background: transparent;
            color: var(--teal-700);
            border: 1px solid var(--teal-300);
            border-radius: 9px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            text-decoration: none;
        }

        .btn-outline-teal:hover {
            background: var(--teal-50);
            color: var(--teal-700);
        }

        @media (max-width: 992px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="layout">

        <!-- ════════════ SIDEBAR ════════════ -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-label">WellCheck System</div>
                <h1>Clinic <span>Hub</span></h1>
            </div>

            <div class="profile-card">
                <img class="profile-avatar" th:src="${clinicAssistant.profilePicture} != null
                         ? 'data:' + ${clinicAssistant.profilePictureType} + ';base64,' + ${clinicAssistant.profilePicture}
                         : '/image/img_avatar1.png'" alt="Profile Picture" />
                <div class="profile-info">
                    <div class="name" th:text="${clinicAssistant.name}">Clinic Assistant</div>
                    <span class="role-badge"
                        th:text="${clinicAssistant.position != null} ? ${clinicAssistant.position} : 'Clinic Assistant'">Assistant</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section-label">Main Menu</div>
                <a th:href="@{/clinicassistant}" class="nav-link-item">
                    <i class="fa-solid fa-calendar-check"></i>
                    Active Appointments
                </a>
                <a th:href="@{/clinicassistant}" class="nav-link-item">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                    Expired Appointments
                </a>
                <div class="nav-section-label" style="margin-top: 8px;">Account</div>
                <a th:href="@{/clinicassistant/updateProfile}" class="nav-link-item active">
                    <i class="fa-solid fa-user-pen"></i>
                    Edit Profile
                </a>
            </nav>

            <div class="sidebar-footer">
                <form th:action="@{/logout}" method="post" hidden name="logoutForm">
                    <input type="submit" value="Logout" />
                </form>
                <a href="javascript: document.logoutForm.submit()" class="logout-btn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Logout
                </a>
            </div>
        </aside>

        <!-- ════════════ MAIN ════════════ -->
        <main class="main">

            <div class="page-header">
                <a th:href="@{/clinicassistant}" class="back-btn" title="Back to Dashboard">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <div class="page-header-text">
                    <div class="subtitle">Account Settings</div>
                    <h2>Edit Profile</h2>
                </div>
            </div>

            <form th:object="${clinicAssistant}" th:action="@{/clinicassistant/updateProfile/profile}" method="post"
                enctype="multipart/form-data">

                <input type="hidden" th:field="*{userId}" />

                <!-- Profile Picture Card -->
                <div class="profile-pic-card">
                    <img class="current-avatar" th:src="${clinicAssistant.profilePicture} != null
                             ? 'data:' + ${clinicAssistant.profilePictureType} + ';base64,' + ${clinicAssistant.profilePicture}
                             : '/image/img_avatar1.png'" alt="Current Profile Picture" id="avatarPreview" />
                    <div class="avatar-info">
                        <h6>Profile Picture</h6>
                        <p>JPG, PNG or GIF. Max size 2MB.</p>
                        <label class="file-input-label">
                            <i class="fa-solid fa-upload"></i>
                            Choose Photo
                            <input type="file" name="imageFile" accept="image/*" onchange="previewImage(this)">
                        </label>
                        <div class="file-name-display" id="fileName">No file chosen</div>
                    </div>
                </div>

                <!-- Info Form Card -->
                <div class="form-card">
                    <div class="form-card-header">
                        <i class="fa-solid fa-id-card"></i>
                        <span>Personal Information</span>
                    </div>

                    <div class="form-card-body">
                        <div class="form-grid">

                            <div class="form-group">
                                <label class="form-label-custom">Full Name</label>
                                <input type="text" th:field="*{name}" class="form-control-custom"
                                    placeholder="Enter full name" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label-custom">Contact Number</label>
                                <input type="text" th:field="*{contact}" class="form-control-custom"
                                    placeholder="e.g. 012-3456789" pattern="[0-9\-]+" required>
                                <div class="helper-text">Numbers and dashes only</div>
                            </div>

                            <div class="form-group">
                                <label class="form-label-custom">Clinic / Hospital</label>
                                <input type="text" th:field="*{clinic}" class="form-control-custom"
                                    placeholder="Enter clinic name" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label-custom">Position</label>
                                <input type="text" th:field="*{position}" class="form-control-custom"
                                    placeholder="e.g. Clinic Assistant" required>
                            </div>

                        </div>
                    </div>

                    <div class="form-card-footer">
                        <a th:href="@{/clinicassistant}" class="btn-outline-teal">
                            <i class="fa-solid fa-xmark"></i> Cancel
                        </a>
                        <button type="submit" class="btn-teal">
                            <i class="fa-solid fa-floppy-disk"></i> Save Changes
                        </button>
                    </div>
                </div>

            </form>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function previewImage(input) {
            const fileName = document.getElementById('fileName');
            const preview = document.getElementById('avatarPreview');
            if (input.files && input.files[0]) {
                fileName.textContent = input.files[0].name;
                const reader = new FileReader();
                reader.onload = e => preview.src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            } else {
                fileName.textContent = 'No file chosen';
            }
        }
    </script>
</body>

</html>
